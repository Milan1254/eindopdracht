<section class="contact-container">

    <h2>Neem Contact Op</h2>

    <p>
        Heb je vragen over onze basketbalschoenen of je bestelling?
        Vul het formulier hieronder in!
    </p>

    <form class="contact-form" id="contactForm">

        <label for="name">Naam</label>
        <input 
            type="text" 
            id="name"
            placeholder="Jouw naam"
        >

        <small class="error" id="nameError"></small>

        <label for="email">E-mail</label>
        <input 
            type="email" 
            id="email"
            placeholder="Jouw e-mail"
        >

        <small class="error" id="emailError"></small>

        <label for="message">Bericht</label>
        <textarea 
            id="message"
            placeholder="Jouw bericht"
            rows="6"
        ></textarea>

        <small class="error" id="messageError"></small>

        <button type="submit" class="btn">
            Verstuur Bericht
        </button>

        <p id="successMessage"></p>

    </form>
<iframe 
      src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d1258.681137729597!2d4.707081265455961!3d50.88000497866437!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47c160d6bc8ad693%3A0x123373d90d53b047!2sBondgenotenlaan%2064%2C%203000%20Leuven!5e0!3m2!1snl!2sbe!4v1779960051372!5m2!1snl!2sbe"
